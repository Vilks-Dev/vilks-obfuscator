server {
    listen 80;
    server_name obfuscator.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name obfuscator.local;

    ssl_certificate /etc/ssl/certs/obfuscator.crt;
    ssl_certificate_key /etc/ssl/private/obfuscator.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend files
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # API Proxying
    location ~ ^/(obfuscate|obfuscate-text|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Max upload size
        client_max_body_size 10M;
        
        # Proxy timeouts
        proxy_connect_timeout 15s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }
}
